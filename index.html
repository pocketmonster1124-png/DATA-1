  <body>
    <!-- <model-viewer> HTML element -->
    <model-viewer src="Lion guarding chinatown.glb" ar ar-modes="webxr scene-viewer quick-look" camera-controls tone-mapping="neutral" poster="poster.webp" shadow-intensity="1" scale="0.5 0.5 0.5" orientation="0deg 45deg 180deg" auto-rotate>
